      height: 100vh;

      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header-dot {
      width: 9px;
      height: 9px;
      background: #b5d400;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

      50% { opacity: 0.4; }

    .chat-header-text {
      font-family: 'Jost', sans-serif;
      color: #ffffff;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;

      font-size: 0.72rem;
      margin-top: 1px;
    }

      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

      gap: 10px;
      align-items: flex-start;
    }
    .chat-msg.user {
      flex-direction: row-reverse;
    }
    .chat-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      overflow: hidden;
    }
    .chat-avatar img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-avatar.user-avatar {
      background: #b5d400;
    }
    .chat-avatar.user-avatar svg {
      width: 15px;
      height: 15px;
      fill: #1a1a1a;
    }
    .chat-bubble {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 0.86rem;
      line-height: 1.6;
      color: #1a1a1a;
      background: #f5f5f3;
    }

      padding-left: 1.3em;

    .chat-bubble ul li {

    .chat-bubble a { color: #5a7a00; text-decoration: underline; }
    .chat-bubble .chat-img-wrap { margin: 10px 0; }
    .chat-bubble img {
      max-width: 100%;
      width: 320px;
      height: auto;
      display: block;
      border-radius: 8px;
      border: 1px solid #e8e8e6;
    }

    /* ── Feedback buttons ── */
    .feedback-row {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      padding-left: 40px;
    }
    .feedback-btn {
      background: none;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      padding: 3px 8px;
      line-height: 1;
      opacity: 0.55;
      transition: opacity 0.15s, border-color 0.15s, background 0.15s;
    }
    .feedback-btn:hover { opacity: 0.9; border-color: #999; }
    .feedback-btn.active { opacity: 1; border-color: #92be00; background: #f0f7e0; }

    /* ── Typing indicator ── */
    .chat-typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 6px 4px;

    .chat-typing span {

    }

    @keyframes bounce {

    const HEADING_PATTERNS = [
      /^requirements summary$/i,
      /^our recommendation$/i,
      /^also worth considering$/i,
      /^why we recommend this$/i,
      /^why this is a strong alternative$/i,
      /^best for[:\s]/i,

    // ── Render plain text with [IMAGE:] tags and Markdown into HTML ──
    function renderResponse(text) {
      let html = text
        .replace(/[\u2014\u2015\u2012\u2011]/g, ' - ')
        .replace(/\s*\u2013\s*/g, ' - ')
        .replace(/(?<![\-])--(?![\-])/g, ' - ');

        const t = line.trim();
        if (!t) return line;
        if (t.startsWith('**') || t.startsWith('*')) return line;
        if (HEADING_PATTERNS.some(re => re.test(t))) return '\x00HEADING\x00' + line;
        if (t.length <= 40 && !/[,;]/.test(t) && /^[A-Z]/.test(t) && !/[.?!]$/.test(t) && !/\s{2}/.test(t)) {
          const wordCount = t.split(/\s+/).length;
          if (wordCount <= 6) return '\x00HEADING\x00' + line;
        }
        return line;
      }).join('\n');

      html = html
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      html = html.replace(/\[IMAGE:([^\]]+)\]/g, (_, name) => {
        const trimmed = name.trim();
        const url = FREET_IMAGES[trimmed];
        if (url) return `<img src="${url}" alt="${trimmed}" loading="lazy">`;
        const lower = trimmed.toLowerCase();
        const key = Object.keys(FREET_IMAGES).find(k => k.toLowerCase() === lower);
        if (key) return `<img src="${FREET_IMAGES[key]}" alt="${trimmed}" loading="lazy">`;
        return `<em>[Image: ${trimmed}]</em>`;
      });

      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
        (_, linkText, url) => `<a href="${url}" target="_blank" rel="noopener">${linkText}</a>`);
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/^---+$/gm, '<hr>');

      const lines = html.split('\n');
      const out = [];
      let inList = false;
      const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };

      for (const line of lines) {
        const t = line.trim();
        if (t === '') { flushList(); continue; }
        if (t === '<hr>') { flushList(); out.push('<hr>'); continue; }
        if (t.startsWith('<img ')) {
          flushList();
          out.push('<div class="chat-img-wrap">' + t + '</div>');
          continue;
        }
        if (/^[-•]\s/.test(t)) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + t.replace(/^[-•]\s+/, '') + '</li>');
          continue;
        }
        flushList();
        if (t.startsWith('\x00HEADING\x00')) {
          const content = t.replace('\x00HEADING\x00', '').trim();
          out.push('<p class="chat-heading"><strong>' + content + '</strong></p>');
          continue;
        }
        if (/^<strong>[^<]+<\/strong>[:.]?$/.test(t)) {
          out.push('<p class="chat-heading">' + t + '</p>');
        } else {
          out.push('<p>' + t + '</p>');
        }
      }
      flushList();
      return out.join('\n');
    }

    // ── Append a message bubble ──
    function appendMessage(role, htmlContent, msgId) {
      const msg = document.createElement('div');
      msg.className = 'chat-msg' + (role === 'user' ? ' user' : '');

      const avatar = role === 'user' ? USER_AVATAR_HTML : BOT_AVATAR_HTML;

      let feedbackHtml = '';
      if (role === 'bot' && msgId) {
        feedbackHtml = `
          <div class="feedback-row" data-msg-id="${msgId}">
            <button class="feedback-btn" data-reaction="liked" title="Helpful">&#128077;</button>
            <button class="feedback-btn" data-reaction="disliked" title="Not helpful">&#128078;</button>
          </div>`;
      }

      const bubble = `<div class="chat-bubble">${htmlContent}</div>`;
      msg.innerHTML = role === 'user'
        ? bubble + avatar
        : avatar + bubble + feedbackHtml;

      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (feedbackHtml) {
        const feedbackRow = msg.querySelector('.feedback-row');
        feedbackRow.querySelectorAll('.feedback-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const reaction = btn.dataset.reaction;
            const currentActive = feedbackRow.querySelector('.feedback-btn.active');
            const newReaction = (currentActive === btn) ? 'neutral' : reaction;
            try {
              await fetch(`${PROXY_BASE}/feedback`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, message_id: msgId, reaction: newReaction })
              });
              feedbackRow.querySelectorAll('.feedback-btn').forEach(b => b.classList.remove('active'));
              if (newReaction !== 'neutral') btn.classList.add('active');
            } catch (e) {
              console.error('Feedback error:', e);
            }
          });
        });
      }
      return msg;
    }

    // ── Typing indicator ──
    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'chat-msg';
      msg.id = 'typingIndicator';
      msg.innerHTML = BOT_AVATAR_HTML +
        `<div class="chat-bubble"><div class="chat-typing"><span></span><span></span><span></span></div></div>`;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    // ── Create conversation ──
    async function createConversation() {
      try {
        const res = await fetch(`${PROXY_BASE}/conversation`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        sessionId = data?.data?.session_id || null;
      } catch (err) {
        console.error('Failed to create conversation:', err);
      }
    }

    // ── Send message ──
    async function sendMessage(prompt) {
      if (!sessionId) await createConversation();
      if (!sessionId) {
        appendMessage('bot', '<p>Sorry, I could not connect to the assistant. Please refresh and try again.</p>');
        return;
      }
      const res = await fetch(`${PROXY_BASE}/message`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, prompt })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const json = await res.json();
      const text = json?.data?.openai_response || 'Sorry, I did not get a response. Please try again.';
      const msgId = json?.data?.id || null;
      return { text, msgId };
    }

    // ── Handle send ──
    async function handleSend() {
      const prompt = chatInput.value.trim();
      if (!prompt || isSending) return;
      isSending = true;
      chatSend.disabled = true;
      chatInput.value = '';
      chatInput.style.height = 'auto';
      appendMessage('user', `<p>${prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>`);
      showTyping();
      try {
        const { text: responseText, msgId } = await sendMessage(prompt);
        removeTyping();
        appendMessage('bot', renderResponse(responseText), msgId);
      } catch (err) {
        removeTyping();
        console.error('Chat error:', err);
        appendMessage('bot', '<p>Something went wrong. Please try again.</p>');
      } finally {
        isSending = false;
        chatSend.disabled = false;
        chatInput.focus();
      }
    }

    // ── Event listeners ──
    chatSend.addEventListener('click', handleSend);
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });

    // ── Init / Reset ──
    async function initChat() {
      chatMessages.innerHTML = '';
      sessionId = null;
      isSending = false;
      chatSend.disabled = false;
      chatInput.value = '';
      chatInput.style.height = 'auto';
      await createConversation();
      appendMessage('bot',
        `<p>Hi! I'm the <strong>Freet Shoe Finder</strong> — here to help you discover your perfect barefoot shoe.</p>` +
        `<p>Tell me what you're looking for — whether it's trail running, office wear, muddy dog walks, or something else entirely — and I'll ask a few quick questions before recommending the best options for you.</p>` +
        `<p>What will you mainly be using your shoes for?</p>`
      );
    }

    document.getElementById('chatReset').addEventListener('click', () => { initChat(); });
    initChat();
  </script>

</body>
</html>
